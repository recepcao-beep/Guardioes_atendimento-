name: Check-in Email Robot

on:
  workflow_dispatch:
    inputs:
      max_emails:
        description: "Quantidade maxima de e-mails para processar"
        required: false
        default: "30"
        type: string

jobs:
  run-checkin-email:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    env:
      HITS_LOGIN_URL: "https://susceptor.apphotel.one/account/login?returnUrl=%2Fconnect%2Fauthorize%2Flogin%3Fresponse_type%3Did_token%2520token%26client_id%3DB37748FC-ED13-4858-AE26-28AB3512A171%26redirect_uri%3Dhttps%253A%252F%252Fnacionalinn.hitspms.net%252FCallback%26scope%3Dopenid%2520profile%2520webapi%26nonce%3DN0.97234054408527631775976059311%26state%3D17759760593110.8316264461059557"
      HITS_USER: ${{ secrets.HITS_USER }}
      HITS_PASSWORD: ${{ secrets.HITS_PASSWORD }}
      GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
      GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
      ROBOT_HEADLESS: "true"
      CHECKIN_MAX_EMAILS: ${{ inputs.max_emails }}
      HITS_WAIT_SECONDS: "40"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r robot/requirements.txt

      - name: Run check-in email robot
        run: python robot/checkin_email_robot.py

      - name: Upload check-in debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: checkin-email-debug
          path: |
            robot/debug/
            robot/Downloads_Hospedes/
          if-no-files-found: ignore
